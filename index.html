<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestion de Bibliothèque</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- TITRE -->

        <h1>
            📚 Gestion de Bibliothèque
        </h1>

        <!-- RECHERCHE -->

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Rechercher un livre..."
            >

        </div>

        <!-- TABLE RESPONSIVE -->

        <div class="table-responsive">

            <!-- TABLEAU -->

            <table id="booksTable">

                <thead>

                    <tr>

                        <th>Titre</th>

                        <th>Auteur</th>

                        <th>Année</th>

                        <th>Prix</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="booksBody">

                    <!-- Livres générés dynamiquement -->

                </tbody>

            </table>

        </div>

        <!-- FORMULAIRE -->

        <h2>Ajouter un livre</h2>

        <form id="bookForm">

            <input
                type="text"
                id="title"
                placeholder="Titre"
                required
            >

            <input
                type="text"
                id="author"
                placeholder="Auteur"
                required
            >

            <input
                type="number"
                id="year"
                placeholder="Année"
                required
            >

            <input
                type="number"
                id="price"
                placeholder="Prix"
                required
            >

            <input
                type="text"
                id="image"
                placeholder="URL image couverture"
                required
            >

            <button
                type="submit"
                class="submit-btn"
            >
                Ajouter
            </button>

        </form>

    </div>

    <!-- MODAL -->

    <div id="bookModal" class="modal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <img id="modalImage" src="" alt="Couverture">

            <div class="modal-info">

                <h3 id="modalTitle"></h3>

                <p>
                    <strong>Auteur :</strong>
                    <span id="modalAuthor"></span>
                </p>

                <p>
                    <strong>Année :</strong>
                    <span id="modalYear"></span>
                </p>

                <p>
                    <strong>Prix :</strong>
                    <span id="modalPrice"></span>
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
